<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Netinho Xperience | Decisiones estratégicas sobre activos</title>
  <meta name="description" content="Segunda opinión estratégica para comprar, vender o invertir en vehículos e inmuebles con más criterio, menos incertidumbre y mejor negociación." />
  <meta name="keywords" content="segunda opinión vehículo Perú, evaluación inmueble Lima, decisión compra auto usado, asesoría compra inmueble, due diligence patrimonial, Netinho Xperience" />

  <meta property="og:title" content="Netinho Xperience | Decisiones estratégicas sobre activos" />
  <meta property="og:description" content="No vendemos activos. Ayudamos a tomar mejores decisiones sobre ellos." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="hero-nx.png" />

  <style>
    :root{
      --navy:#06182c;
      --navy-2:#0b223c;
      --gold:#c9a24d;
      --white:#f7f4ed;
      --muted:#b8c0cc;
      --dark:#030b14;
      --card:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.12);
    }

    *{box-sizing:border-box;margin:0;padding:0}

    html{scroll-behavior:smooth}

    body{
      font-family:Inter,Segoe UI,Arial,sans-serif;
      background:var(--dark);
      color:var(--white);
      line-height:1.6;
    }

    a{text-decoration:none;color:inherit}

    .navbar{
      position:fixed;
      top:0;
      width:100%;
      z-index:100;
      background:rgba(3,11,20,.76);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
    }

    .nav-inner{
      max-width:1180px;
      margin:auto;
      padding:18px 24px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:700;
      letter-spacing:.04em;
    }

    .brand img{
      width:42px;
      height:42px;
      object-fit:contain;
    }

    .nav-links{
      display:flex;
      gap:26px;
      font-size:.9rem;
      color:var(--muted);
    }

    .nav-links a:hover{color:var(--gold)}

    .hero{
      min-height:100vh;
      padding:140px 24px 80px;
      background:
        linear-gradient(90deg, rgba(3,11,20,.98) 0%, rgba(6,24,44,.88) 45%, rgba(6,24,44,.45) 100%),
        url("hero-nx.png") center right / cover no-repeat;
      display:flex;
      align-items:center;
    }

    .hero-content{
      max-width:1180px;
      margin:auto;
      width:100%;
    }

    .eyebrow{
      color:var(--gold);
      font-size:.78rem;
      letter-spacing:.18em;
      text-transform:uppercase;
      margin-bottom:22px;
    }

    h1{
      max-width:780px;
      font-size:clamp(2.4rem,5vw,4.8rem);
      line-height:1.04;
      letter-spacing:-.045em;
      margin-bottom:28px;
    }

    .hero-sub{
      max-width:650px;
      color:var(--muted);
      font-size:1.15rem;
      margin-bottom:36px;
    }

    .actions{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:52px;
    }

    .btn{
      padding:15px 26px;
      border-radius:999px;
      font-weight:700;
      transition:.28s ease;
      border:1px solid var(--border);
      display:inline-block;
    }

    .btn-primary{
      background:var(--gold);
      color:#101010;
    }

    .btn-secondary{
      color:var(--white);
      background:rgba(255,255,255,.05);
    }

    .btn:hover{transform:translateY(-2px)}

    .hero-points{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
      max-width:840px;
    }

    .point{
      background:rgba(255,255,255,.06);
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px;
      backdrop-filter:blur(12px);
    }

    .point span{
      color:var(--gold);
      font-size:.8rem;
      display:block;
      margin-bottom:8px;
    }

    section{padding:96px 24px}

    .container{max-width:1180px;margin:auto}

    .section-title{
      max-width:780px;
      margin-bottom:46px;
    }

    .section-title small{
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.16em;
      font-size:.75rem;
    }

    .section-title h2{
      font-size:clamp(2rem,4vw,3.4rem);
      line-height:1.08;
      letter-spacing:-.04em;
      margin-top:14px;
    }

    .section-title p{
      color:var(--muted);
      margin-top:18px;
      font-size:1.05rem;
    }

    .problem{background:linear-gradient(180deg,var(--dark),var(--navy))}

    .grid-3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:22px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:26px;
      padding:32px;
      min-height:260px;
      transition:.3s ease;
    }

    .card:hover{
      transform:translateY(-5px);
      border-color:rgba(201,162,77,.35);
    }

    .card h3{
      margin-bottom:14px;
      font-size:1.28rem;
    }

    .card p{
      color:var(--muted);
      font-size:.98rem;
    }

    .badge{
      display:inline-block;
      margin-top:18px;
      background:rgba(201,162,77,.10);
      color:var(--gold);
      padding:5px 10px;
      border-radius:8px;
      font-size:.72rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.06em;
    }

    .decision-box{
      background:
        linear-gradient(135deg,rgba(201,162,77,.12),rgba(255,255,255,.03));
      border:1px solid rgba(201,162,77,.25);
      border-radius:30px;
      padding:46px;
    }
